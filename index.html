<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Disk Scheduling Visualization</title>

    <link rel="stylesheet" href="style.css">

    <script src="data.js"></script>

    <script defer src="script.js"></script>

</head>

<body>

    <div class="container">

        <h1>Disk Scheduling Visualization</h1>

        <!-- COMBINED -->

        <section class="card">

            <h2>Combined Graph</h2>

            <div class="chart-wrapper">

                <svg id="movementChart"></svg>

            </div>

        </section>

        <!-- FCFS -->

        <section class="card">

            <h2>FCFS</h2>

            <div class="chart-wrapper">

                <svg id="fcfsChart"></svg>

            </div>

        </section>

        <!-- SCAN -->

        <section class="card">

            <h2>SCAN</h2>

            <div class="chart-wrapper">

                <svg id="scanChart"></svg>

            </div>

        </section>

        <!-- CSCAN -->

        <section class="card">

            <h2>C-SCAN</h2>

            <div class="chart-wrapper">

                <svg id="cscanChart"></svg>

            </div>

        </section>

        <!-- BAR CHART -->

        <section class="card">

            <h2>Performance Comparison</h2>

            <div class="chart-wrapper">

                <svg id="barChart"></svg>

            </div>

        </section>

    </div>

</body>

</html>
